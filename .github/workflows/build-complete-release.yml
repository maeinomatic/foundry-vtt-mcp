name: Build Complete Release

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for manual runs (required only when publish_prerelease=true)'
        required: false
        default: ''
      publish_prerelease:
        description: 'Create a GitHub pre-release from this manual run'
        required: false
        default: false
        type: boolean
      dry_run_foundry:
        description: 'Dry-run Foundry registry call on tagged releases only (ignored for manual runs)'
        required: false
        default: false
        type: boolean

jobs:
  build-nsis:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.12.2'

    - name: Check version consistency
      run: npm run version:check

    - name: Set Package Version
      id: version
      run: |
        try {
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
            Write-Host "✓ Using manual input version: $version"

            # Validate version format
            if ($version -notmatch '^v?\d+\.\d+\.\d+') {
              throw "Invalid version format: '$version'. Expected format: v0.0.0 or 0.0.0"
            }
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
            Write-Host "✓ Using tag version: $version"

            # Validate tag version format
            if ($version -notmatch '^v?\d+\.\d+\.\d+') {
              throw "Invalid tag version format: '$version'. Expected format: v0.0.0"
            }
          } else {
            Write-Host "📋 Reading version from package.json..."

            # Check if package.json exists
            if (-not (Test-Path "package.json")) {
              throw "package.json not found in repository root"
            }

            # Read and parse package.json
            $packageJson = Get-Content package.json -Raw | ConvertFrom-Json

            # Validate version field exists
            if (-not $packageJson.version) {
              throw "No 'version' field found in package.json"
            }

            $packageVersion = $packageJson.version
            Write-Host "📦 Found package.json version: $packageVersion"

            # Validate version format
            if ($packageVersion -notmatch '^\d+\.\d+\.\d+') {
              throw "Invalid package.json version format: '$packageVersion'. Expected format: 0.0.0"
            }

            $version = "v$packageVersion"
            Write-Host "✓ Using package.json version: $version"
          }

          # Final validation - ensure no invalid characters for filename
          if ($version -match '[<>:"/\\|?*]') {
            throw "Version contains invalid filename characters: '$version'"
          }

          Write-Host "🎯 Final PACKAGE_VERSION: $version"
          echo "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
          echo "version=$version" >> $env:GITHUB_OUTPUT

        } catch {
          Write-Error "❌ Failed to determine package version: $($_.Exception.Message)"
          Write-Error "📋 Context: github.event.inputs.version='${{ github.event.inputs.version }}', github.ref_type='${{ github.ref_type }}', github.ref_name='${{ github.ref_name }}'"
          exit 1
        }

    - name: Install workspace dependencies (CI)
      run: npm ci --workspaces --include-workspace-root

    - name: Build shared types
      run: npm run build --workspace=shared

    - name: Build MCP Server (Bundled)
      run: npm run build:bundle --workspace=packages/mcp-server

    - name: Setup NSIS
      run: choco install nsis -y

    - name: Build NSIS Installer
      run: |
        $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
        cd installer
        node build-nsis.js --version $env:PACKAGE_VERSION

    - name: Create Foundry Module ZIP
      run: |
        Write-Host "📦 Creating Foundry module ZIP for registry..."
        cd packages/foundry-module

        # Create ZIP excluding hidden files and node_modules
        $compress = @{
          Path = Get-ChildItem -Path "." -Exclude ".*", "node_modules"
          DestinationPath = "..\..\foundry-vtt-mcp.zip"
          CompressionLevel = "Optimal"
        }
        Compress-Archive @compress -Force

        # Verify ZIP was created
        if (Test-Path "..\..\foundry-vtt-mcp.zip") {
          $size = (Get-Item "..\..\foundry-vtt-mcp.zip").Length / 1KB
          Write-Host "✓ Foundry module ZIP created ($([math]::Round($size, 1)) KB)"
        } else {
          Write-Host "❌ Foundry module ZIP creation failed"
          exit 1
        }

    - name: Create Standalone MCP Server ZIP
      run: |
        Write-Host "📦 Creating standalone MCP server ZIP for manual installation..."

        # Create a temporary directory for the standalone package
        $standalonePath = "standalone-mcp-server"
        New-Item -ItemType Directory -Force -Path $standalonePath

        # Copy MCP server bundle
        Copy-Item "packages\mcp-server\dist\index.bundle.cjs" "$standalonePath\index.js"

        # Create package.json for standalone
        $standalonePackage = @{
          name = "foundry-mcp-server"
          version = "${{ steps.version.outputs.version }}".TrimStart('v')
          description = "Foundry VTT MCP Server - Standalone Installation"
          main = "index.js"
          scripts = @{
            start = "node index.js"
          }
          engines = @{
            node = ">=18.0.0"
          }
        } | ConvertTo-Json -Depth 3

        $standalonePackage | Out-File -FilePath "$standalonePath\package.json" -Encoding UTF8

        # Create README for standalone
        $readmeLines = @(
          "# Foundry MCP Server - Manual Installation",
          "",
          "This package contains the standalone MCP server for manual installation on any platform.",
          "",
          "## Requirements",
          "- Node.js 18.0.0 or later",
          "- Foundry VTT with MCP Bridge module installed",
          "",
          "## Installation",
          "1. Extract this ZIP to your desired location",
          "2. Run: npm start or node index.js",
          "3. Configure Claude Desktop to connect to this server",
          "4. Install the MCP Bridge module in Foundry VTT",
          "",
          "For full documentation visit: ${{ github.server_url }}/${{ github.repository }}",
          "",
          "Version: ${{ steps.version.outputs.version }}"
        )
        $readmeLines | Out-File -FilePath "$standalonePath\README.md" -Encoding UTF8

        # Create the ZIP
        $compress = @{
          Path = $standalonePath
          DestinationPath = "foundry-mcp-server-${{ steps.version.outputs.version }}.zip"
          CompressionLevel = "Optimal"
        }
        Compress-Archive @compress -Force

        # Verify and clean up
        if (Test-Path "foundry-mcp-server-${{ steps.version.outputs.version }}.zip") {
          $size = (Get-Item "foundry-mcp-server-${{ steps.version.outputs.version }}.zip").Length / 1KB
          Write-Host "✓ Standalone MCP server ZIP created ($([math]::Round($size, 1)) KB)"
        } else {
          Write-Host "❌ Standalone MCP server ZIP creation failed"
          exit 1
        }

        # Clean up temporary directory
        Remove-Item -Recurse -Force $standalonePath

    - name: Verify installer package
      run: |
        cd installer/build
        dir
        if (Test-Path "FoundryMCPServer-Setup-$env:PACKAGE_VERSION.exe") {
          Write-Host "✓ NSIS installer found"
          $size = (Get-Item "FoundryMCPServer-Setup-$env:PACKAGE_VERSION.exe").Length / 1MB
          Write-Host "📊 Installer size: $([math]::Round($size, 1)) MB"
        } else {
          Write-Host "❌ NSIS installer not found"
          exit 1
        }

    - name: Upload installer as artifact
      uses: actions/upload-artifact@v4
      with:
        name: foundry-mcp-server-installer-${{ steps.version.outputs.version }}
        path: installer/build/FoundryMCPServer-Setup-${{ steps.version.outputs.version }}.exe
        retention-days: 30

  build-mac-pkg:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.12.2'

    - name: Check version consistency
      run: npm run version:check

    - name: Set Package Version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
          echo "✓ Using manual input version: $VERSION"

          # Validate version format
          if ! echo "$VERSION" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "❌ Invalid version format: '$VERSION'. Expected format: v0.0.0 or 0.0.0"
            exit 1
          fi
        elif [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION="${{ github.ref_name }}"
          echo "✓ Using tag version: $VERSION"

          # Validate tag version format
          if ! echo "$VERSION" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "❌ Invalid tag version format: '$VERSION'. Expected format: v0.0.0"
            exit 1
          fi
        else
          echo "📋 Reading version from package.json..."

          # Check if package.json exists
          if [ ! -f "package.json" ]; then
            echo "❌ package.json not found in repository root"
            exit 1
          fi

          # Read and parse package.json (using node for JSON parsing)
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          # Validate version field exists
          if [ -z "$PACKAGE_VERSION" ]; then
            echo "❌ No 'version' field found in package.json"
            exit 1
          fi

          echo "📦 Found package.json version: $PACKAGE_VERSION"

          # Validate version format
          if ! echo "$PACKAGE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "❌ Invalid package.json version format: '$PACKAGE_VERSION'. Expected format: 0.0.0"
            exit 1
          fi

          VERSION="v$PACKAGE_VERSION"
          echo "✓ Using package.json version: $VERSION"
        fi

        echo "🎯 Final PACKAGE_VERSION: $VERSION"
        echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Install workspace dependencies (CI)
      run: npm ci --workspaces --include-workspace-root

    - name: Build shared types
      run: npm run build --workspace=shared

    - name: Build MCP Server (Bundled)
      run: npm run build:bundle --workspace=packages/mcp-server

    - name: Build Foundry Module
      run: npm run build --workspace=packages/foundry-module

    - name: Build Mac PKG Installer
      run: |
        cd installer
        node build-mac-pkg.js

    - name: Build Mac DMG Distribution
      run: |
        cd installer
        node build-dmg.js

    - name: Verify Mac DMG
      run: |
        cd installer/build
        ls -lh
        # Strip 'v' prefix from version for filename check
        VERSION="${{ steps.version.outputs.version }}"
        VERSION_NO_V="${VERSION#v}"
        if [ -f "FoundryMCPServer-${VERSION_NO_V}.dmg" ]; then
          echo "✓ Mac DMG distribution found"
          SIZE=$(du -h "FoundryMCPServer-${VERSION_NO_V}.dmg" | cut -f1)
          echo "📊 DMG size: $SIZE"
          # Copy with v prefix for artifact upload consistency
          cp "FoundryMCPServer-${VERSION_NO_V}.dmg" "FoundryMCPServer-${VERSION}.dmg"
        else
          echo "❌ Mac DMG not found (expected: FoundryMCPServer-${VERSION_NO_V}.dmg)"
          exit 1
        fi

    - name: Upload Mac DMG as artifact
      uses: actions/upload-artifact@v4
      with:
        name: foundry-mcp-server-dmg-${{ steps.version.outputs.version }}
        path: installer/build/FoundryMCPServer-${{ steps.version.outputs.version }}.dmg
        retention-days: 30

  create-release:
    needs: [build-nsis, build-mac-pkg]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_prerelease == 'true')
    permissions:
      contents: write
    env:
      FOUNDRY_ENABLE_REGISTRY_PUBLISH: 'false'
      FOUNDRY_RELEASE_SECRET_NAME: FOUNDRY_PACKAGE_RELEASE_TOKEN

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.12.2'

    - name: Check version consistency
      run: npm run version:check

    - name: Resolve release metadata
      id: release_meta
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION_INPUT="${{ github.event.inputs.version }}"
          if [ -z "$VERSION_INPUT" ]; then
            echo "❌ Manual pre-release requires workflow input 'version'"
            exit 1
          fi

          if ! echo "$VERSION_INPUT" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$'; then
            echo "❌ Invalid version format: '$VERSION_INPUT'"
            echo "Expected format examples: v1.2.3, 1.2.3, v1.2.3-rc.1"
            exit 1
          fi

          TAG="${VERSION_INPUT#v}"
          TAG="v$TAG"
          RELEASE_NAME="Foundry MCP Server $TAG (Pre-release)"
          IS_PRERELEASE=true
        else
          TAG="${{ github.ref_name }}"
          RELEASE_NAME="Foundry MCP Server $TAG"
          IS_PRERELEASE=false
        fi

        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
        echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

    - name: Prepare release manifest metadata
      run: |
        node <<'EOF'
        const fs = require('node:fs');

        const path = './packages/foundry-module/module.json';
        const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));

        const serverUrl = process.env.GH_SERVER_URL;
        const repository = process.env.GH_REPOSITORY;
        const defaultBranch = process.env.GH_DEFAULT_BRANCH || 'master';

        manifest.url = `${serverUrl}/${repository}`;
        manifest.bugs = `${serverUrl}/${repository}/issues`;
        manifest.changelog = `${serverUrl}/${repository}/releases`;
        manifest.readme = `${serverUrl}/${repository}/blob/${defaultBranch}/README.md`;
        manifest.license = `${serverUrl}/${repository}/blob/${defaultBranch}/LICENSE`;
        manifest.manifest = `https://raw.githubusercontent.com/${repository}/${defaultBranch}/packages/foundry-module/module.json`;
        manifest.download = `${serverUrl}/${repository}/releases/latest/download/foundry-vtt-mcp.zip`;

        fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
        console.log('Updated packages/foundry-module/module.json metadata for this repository context.');
        EOF
      env:
        GH_SERVER_URL: ${{ github.server_url }}
        GH_REPOSITORY: ${{ github.repository }}
        GH_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    - name: Set Package Version
      id: version
      run: |
        VERSION="${{ steps.release_meta.outputs.tag }}"
        # Remove 'v' prefix for filenames if present
        PACKAGE_VERSION="${VERSION#v}"
        echo "PACKAGE_VERSION=v$PACKAGE_VERSION" >> $GITHUB_ENV
        echo "version=v$PACKAGE_VERSION" >> $GITHUB_OUTPUT

    - name: Install workspace dependencies
      run: npm ci --workspaces --include-workspace-root

    - name: Build shared types
      run: npm run build --workspace=shared

    - name: Build MCP Server (Bundled)
      run: npm run build:bundle --workspace=packages/mcp-server

    - name: Build Foundry Module
      run: npm run build --workspace=packages/foundry-module

    - name: Download Windows installer artifact
      uses: actions/download-artifact@v4
      with:
        name: foundry-mcp-server-installer-${{ steps.version.outputs.version }}
        path: installer/build/

    - name: Download Mac DMG artifact
      uses: actions/download-artifact@v4
      with:
        name: foundry-mcp-server-dmg-${{ steps.version.outputs.version }}
        path: installer/build/

    - name: Create Foundry Module ZIP
      run: |
        cd packages/foundry-module
        zip -r ../../foundry-vtt-mcp.zip . -x ".*" -x "node_modules/*"
        cd ../..
        ls -lh foundry-vtt-mcp.zip

    - name: Create Standalone MCP Server ZIP
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        VERSION_NO_V="${VERSION#v}"
        mkdir -p standalone-mcp-server
        cp packages/mcp-server/dist/index.bundle.cjs standalone-mcp-server/index.js

        # Create package.json
        cat > standalone-mcp-server/package.json << EOF
        {
          "name": "foundry-mcp-server",
          "version": "$VERSION_NO_V",
          "description": "Foundry VTT MCP Server - Standalone Installation",
          "main": "index.js",
          "scripts": {
            "start": "node index.js"
          },
          "engines": {
            "node": ">=18.0.0"
          }
        }
        EOF

        # Create README
        cat > standalone-mcp-server/README.md << EOF
        # Foundry MCP Server - Manual Installation

        This package contains the standalone MCP server for manual installation on any platform.

        ## Requirements
        - Node.js 18.0.0 or later
        - Foundry VTT with MCP Bridge module installed

        ## Installation
        1. Extract this ZIP to your desired location
        2. Run: npm start or node index.js
        3. Configure Claude Desktop to connect to this server
        4. Install the MCP Bridge module in Foundry VTT

        For full documentation visit: ${{ github.server_url }}/${{ github.repository }}

        Version: ${{ steps.version.outputs.version }}
        EOF

        zip -r foundry-mcp-server-${{ steps.version.outputs.version }}.zip standalone-mcp-server
        rm -rf standalone-mcp-server
        ls -lh foundry-mcp-server-${{ steps.version.outputs.version }}.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_meta.outputs.tag }}
        target_commitish: ${{ github.sha }}
        name: ${{ steps.release_meta.outputs.release_name }}
        body: |
          ## Foundry MCP Server ${{ steps.release_meta.outputs.tag }}

          Complete multi-platform distribution for Foundry MCP Server - AI-powered campaign management for Foundry VTT using Claude Desktop.

          ### 📦 Installation Options

          **Windows Users:**
          - Download `FoundryMCPServer-Setup-${{ steps.release_meta.outputs.tag }}.exe`
          - Run installer (no admin rights required)
          - Automatic Claude Desktop configuration

          **Mac Users:**
          - Download `FoundryMCPServer-${{ steps.release_meta.outputs.tag }}.dmg`
          - Open DMG and double-click the PKG installer
          - Choose components: MCP Server (required), Foundry Module, ComfyUI AI Maps
          - Automatic Claude Desktop configuration
          - To uninstall: Double-click `Uninstall.tool` from the DMG

          **Manual Installation (All Platforms):**
          - Download `foundry-mcp-server-${{ steps.release_meta.outputs.tag }}.zip`
          - Extract and run with Node.js 18+
          - Manual Claude Desktop configuration required

          **Foundry VTT Users:**
          - Install directly from Foundry's module browser
          - Or use manifest: `https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.repository.default_branch }}/packages/foundry-module/module.json`

          ### 🚀 Quick Start
          1. Choose your installation method above
          2. Install MCP Bridge module in Foundry VTT
          3. Restart Claude Desktop
          4. Start creating AI-powered campaigns!

          ### 📋 Features
          - 25 MCP tools for comprehensive Foundry VTT integration
          - Actor creation with natural language processing
          - Quest management with HTML generation and updates
          - Campaign system with multi-part structure and progress tracking
          - Dice roll coordination between Claude and Foundry players
          - Actor ownership management with bulk operations
          - Enhanced creature index for instant monster searches
          - AI-powered battlemap generation with ComfyUI integration

          For full documentation, visit: ${{ github.server_url }}/${{ github.repository }}
        files: |
          installer/build/FoundryMCPServer-Setup-${{ steps.version.outputs.version }}.exe
          installer/build/FoundryMCPServer-${{ steps.version.outputs.version }}.dmg
          foundry-vtt-mcp.zip
          foundry-mcp-server-${{ steps.version.outputs.version }}.zip
          packages/foundry-module/module.json
        generate_release_notes: true
        draft: false
        prerelease: ${{ steps.release_meta.outputs.prerelease }}

    - name: Skip Foundry VTT Package Registry update (disabled)
      if: startsWith(github.ref, 'refs/tags/v') && env.FOUNDRY_ENABLE_REGISTRY_PUBLISH != 'true'
      run: |
        echo "ℹ️ Foundry registry publish is disabled for this repository."
        echo "Set create-release env FOUNDRY_ENABLE_REGISTRY_PUBLISH=true to enable publishing."

    - name: Update Foundry VTT Package Registry
      if: startsWith(github.ref, 'refs/tags/v') && env.FOUNDRY_ENABLE_REGISTRY_PUBLISH == 'true'
      env:
        FOUNDRY_PACKAGE_RELEASE_TOKEN: ${{ secrets[env.FOUNDRY_RELEASE_SECRET_NAME] }}
        FOUNDRY_RELEASE_ENDPOINT: https://foundryvtt.com/_api/packages/release_version/
      run: |
        echo "🔄 Updating Foundry VTT Package Registry..."

        DRY_RUN=false
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run_foundry }}" = "true" ]; then
          DRY_RUN=true
          echo "🧪 dry_run_foundry=true: sending API validation request with dry-run enabled"
        fi

        # Validate secret availability with a clear error
        if [ -z "${FOUNDRY_PACKAGE_RELEASE_TOKEN:-}" ]; then
          echo "❌ FOUNDRY_PACKAGE_RELEASE_TOKEN is not configured"
          exit 1
        fi

        # Extract package information
        PACKAGE_ID=$(node -p "require('./packages/foundry-module/module.json').id")
        VERSION="${{ steps.version.outputs.version }}"
        VERSION="${VERSION#v}"  # Remove v prefix
        MANIFEST_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json"
        RELEASE_NOTES_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

        MINIMUM=$(node -p "require('./packages/foundry-module/module.json').compatibility.minimum")
        VERIFIED=$(node -p "require('./packages/foundry-module/module.json').compatibility.verified")
        MAXIMUM=$(node -p "require('./packages/foundry-module/module.json').compatibility.maximum")

        echo "📦 Package ID: $PACKAGE_ID"
        echo "📝 Version: $VERSION"
        echo "📎 Manifest URL: $MANIFEST_URL"
        echo "📋 Release Notes: $RELEASE_NOTES_URL"

        DRY_RUN_FIELD=""
        if [ "$DRY_RUN" = "true" ]; then
          DRY_RUN_FIELD='"dry-run": true,'
        fi

        # Prepare API request body
        REQUEST_BODY=$(cat <<EOF
        {
          "id": "$PACKAGE_ID",
          ${DRY_RUN_FIELD}
          "release": {
            "version": "$VERSION",
            "manifest": "$MANIFEST_URL",
            "notes": "$RELEASE_NOTES_URL",
            "compatibility": {
              "minimum": "$MINIMUM",
              "verified": "$VERIFIED",
              "maximum": "$MAXIMUM"
            }
          }
        }
        EOF
        )

        echo "🔧 Request Body:"
        echo "$REQUEST_BODY"

        # Make API call to Foundry VTT Package Registry
        RESPONSE=$(curl -sS -f -X POST \
          --retry 3 \
          --retry-delay 2 \
          --connect-timeout 15 \
          --max-time 60 \
          -H "Content-Type: application/json" \
          -H "Authorization: ${FOUNDRY_PACKAGE_RELEASE_TOKEN}" \
          -d "$REQUEST_BODY" \
          "${FOUNDRY_RELEASE_ENDPOINT}")

        if [ $? -eq 0 ]; then
          echo "✅ Successfully updated Foundry VTT Package Registry"
          echo "📄 Response: $RESPONSE"
        else
          echo "❌ Failed to update Foundry VTT Package Registry"
          echo "🔍 Error: $RESPONSE"
          exit 1
        fi
